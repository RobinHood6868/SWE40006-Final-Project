name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        
    - name: Install dependencies
      run: npm install
      
    - name: Run Tests
      # We use our custom test script which includes the necessary NODE_OPTIONS for ES modules
      run: npm test
      env:
        # Provide a dummy database URL or configured test DB so tests don't immediately crash if they check for it
        DATABASE_URL: postgres://postgres:postgres@localhost:5432/test_db
        NODE_ENV: test
